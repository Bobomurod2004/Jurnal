services:
  db:
    image: postgres:17-alpine
    container_name: journal_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db_backup.sql:/docker-entrypoint-initdb.d/01-restore.sql:ro
    # ports:
    #   - "5433:5432"  # Do NOT expose DB port in production
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d journal2" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mainweb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: journal_mainweb
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # - ./mainweb:/app/mainweb  # Remove source mount in production
      - uploads_data:/var/www/journal/static/uploads
    working_dir: /app/mainweb
    command: gunicorn --bind 0.0.0.0:5000 --workers 4 --threads 2 --timeout 120 --access-logfile - --error-logfile - run:app
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "5000"

  fmadmin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: journal_fmadmin
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # - ./fmadmin:/app/fmadmin  # Remove source mount in production
      - ./mainweb/.env:/app/.env:ro
      - uploads_data:/var/www/journal/static/uploads
    working_dir: /app/fmadmin
    command: gunicorn --bind 0.0.0.0:5001 --workers 4 --threads 2 --timeout 120 --access-logfile - --error-logfile - run:app
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "5001"

  nginx:
    image: nginx:alpine
    container_name: journal_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./mainweb/static:/var/www/mainweb/static:ro
      - ./fmadmin/dist:/var/www/fmadmin/dist:ro
      - uploads_data:/var/www/journal/static/uploads:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - mainweb
      - fmadmin

  certbot:
    image: certbot/certbot
    container_name: journal_certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    depends_on:
      - nginx

volumes:
  postgres_data:
  uploads_data:
  certbot_data:
  certbot_www:
