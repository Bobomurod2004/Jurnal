events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # Hide nginx version
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # Upstream servers
    upstream mainweb {
        server mainweb:5000;
    }

    upstream fmadmin {
        server fmadmin:5001;
    }

    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location = /favicon.ico {
            alias /var/www/mainweb/static/favicon.ico;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Mainweb static files
        location /static/ {
            alias /var/www/mainweb/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Uploaded files (shared between apps)
        location /static/uploads/ {
            alias /var/www/journal/static/uploads/;
            expires 30d;
        }

        # fmadmin static files (dist folder)
        location /dist/ {
            alias /var/www/fmadmin/dist/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Rate limit login endpoints
        location ~ ^/(login|register|fmadmin/login) {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://mainweb;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin panel
        location /fmadmin/ {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://fmadmin/fmadmin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_read_timeout 120s;
        }

        # Block access to Swagger docs in production
        location /api/docs {
            return 404;
        }
        location /apispec.json {
            return 404;
        }

        # Main website (default)
        location / {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://mainweb/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_read_timeout 120s;
        }

        # Custom error pages
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
